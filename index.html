API란 
  어플리케이션 프로그래밍 인터페이스의 약자(Application Programming Interface)
  프로그램과 서버의 데이터베이스와 상호작용을 도와주는 역할
  (데이터를 주고 받을 수 있도록 하는 서비스)

  동기(Synchronous)와 비동기(Asynchronous)
  동기(Synchronous)식 : 순차적으로 작업을 수행하는것(순서대로 작업을 수행하는 것)
  먼저 나온 작업이 끝나야 다음 작업이 실행이 되는것

  비동기(Asynchronous): 앞에서 작업이 끝나지 않았더라도 계속 요청을 받음
  시간이 걸리지 않는 것을 먼저 처리해줌
  시간이 걸리는 것은 나중에 처리해줌

    async function weather(){
    let response = await fetch("서버주소") 해당 서버 주소에 정보를 요청을 함
    let date = await response.json() response에 담긴 정보는 객체형태로 들어가있음(서버 관련 정보)
  }
